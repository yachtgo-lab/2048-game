<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>2048 Clone - Supabase Ranking Fixed</title>
  <style>
    :root {
      --board-size: min(92vw, 500px);
      --gap: 12px;
      --size: 4;
      --cell-size: calc((var(--board-size) - (var(--gap) * (var(--size) + 1))) / var(--size));
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #faf8ef;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: #776e65;
      overscroll-behavior: none;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none;
    }

    .container {
      width: var(--board-size);
      padding: 18px 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(46px, 13vw, 72px);
      line-height: 1;
      font-weight: 900;
      color: #776e65;
    }

    .scores { display: flex; gap: 8px; }

    .score-box {
      min-width: 76px;
      padding: 8px 12px;
      border-radius: 6px;
      background: #bbada0;
      color: #fff;
      text-align: center;
      font-weight: 800;
    }

    .score-box small {
      display: block;
      margin-bottom: 2px;
      font-size: 12px;
      color: #eee4da;
    }

    .score-box span { font-size: 21px; }

    .intro {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      font-size: 15px;
      line-height: 1.45;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .mode-buttons { display: flex; gap: 8px; }

    button {
      border: 0;
      border-radius: 6px;
      padding: 11px 14px;
      background: #8f7a66;
      color: #f9f6f2;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover { filter: brightness(0.96); }
    button.secondary { background: #bbada0; }
    button.active { background: #776e65; }
    button:disabled { opacity: 0.45; cursor: not-allowed; filter: none; }

    .board {
      position: relative;
      width: var(--board-size);
      height: var(--board-size);
      padding: var(--gap);
      border-radius: 10px;
      background: #bbada0;
      overflow: hidden;
      user-select: none;
    }

    .grid {
      position: absolute;
      inset: var(--gap);
      display: grid;
      grid-template-columns: repeat(var(--size), var(--cell-size));
      grid-template-rows: repeat(var(--size), var(--cell-size));
      gap: var(--gap);
      z-index: 1;
    }

    .grid-cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border-radius: 7px;
      background: rgba(238, 228, 218, 0.35);
    }

    .tile-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .tile {
      position: absolute;
      width: var(--cell-size);
      height: var(--cell-size);
      border-radius: 7px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 900;
      line-height: 1;
      transition: left 115ms ease, top 115ms ease, transform 115ms ease;
      will-change: left, top, transform;
      z-index: 2;
    }

    .tile.new { animation: newTile 140ms ease; }
    .tile.merged { animation: mergePop 170ms ease 110ms both; z-index: 4; }

    @keyframes newTile {
      0% { transform: scale(0); }
      70% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes mergePop {
      0% { transform: scale(1); }
      55% { transform: scale(1.16); }
      100% { transform: scale(1); }
    }

    .v2 { background: #eee4da; color: #776e65; }
    .v4 { background: #ede0c8; color: #776e65; }
    .v8 { background: #f2b179; color: #f9f6f2; }
    .v16 { background: #f59563; color: #f9f6f2; }
    .v32 { background: #f67c5f; color: #f9f6f2; }
    .v64 { background: #f65e3b; color: #f9f6f2; }
    .v128 { background: #edcf72; color: #f9f6f2; }
    .v256 { background: #edcc61; color: #f9f6f2; }
    .v512 { background: #edc850; color: #f9f6f2; }
    .v1024 { background: #edc53f; color: #f9f6f2; }
    .v2048 { background: #edc22e; color: #f9f6f2; }
    .v4096 { background: #a7d46f; color: #f9f6f2; }
    .v8192 { background: #7cc47f; color: #f9f6f2; }
    .vbig { background: #3c3a32; color: #f9f6f2; }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 14px;
      padding: 20px;
      border-radius: 10px;
      background: rgba(238, 228, 218, 0.78);
      text-align: center;
    }

    .overlay.show { display: flex; }

    .overlay h2 {
      margin: 0;
      font-size: clamp(36px, 11vw, 54px);
      color: #776e65;
    }

    .overlay p { margin: 0; font-weight: 700; }

    .rank-form {
      display: flex;
      gap: 8px;
      width: min(100%, 320px);
    }

    .rank-form input {
      width: 100%;
      border: 0;
      outline: 0;
      border-radius: 6px;
      padding: 11px 12px;
      font-size: 15px;
      font-weight: 700;
      color: #776e65;
      background: #fff;
    }

    .rank-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.32);
    }

    .rank-modal.show { display: flex; }

    .rank-modal-card {
      width: min(92vw, 430px);
      max-height: 86vh;
      overflow-y: auto;
      padding: 18px;
      border-radius: 14px;
      background: #faf8ef;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
    }

    .rank-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .rank-modal-header h3 {
      margin: 0;
      font-size: 22px;
      color: #776e65;
    }

    .rank-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .rank-panel-modal {
      padding: 10px;
      border-radius: 10px;
      background: rgba(187, 173, 160, 0.22);
      margin-bottom: 12px;
    }

    .rank-panel-modal table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }

    .rank-panel-modal th,
    .rank-panel-modal td {
      padding: 9px 6px;
      text-align: center;
      border-bottom: 1px solid rgba(119, 110, 101, 0.16);
    }

    .rank-panel-modal th {
      color: #8f7a66;
      font-size: 12px;
    }

    .rank-panel-modal td.name {
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
      color: #776e65;
    }

    .small-btn {
      padding: 8px 10px;
      font-size: 12px;
    }

    .empty-rank {
      color: #8f7a66;
      text-align: center;
      padding: 12px 0;
      font-size: 14px;
    }

    .hint {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      color: #8f7a66;
    }

    @media (max-width: 430px) {
      :root { --gap: 9px; }
      .header { align-items: flex-start; }
      .scores { flex-direction: column; }
      .score-box { min-width: 70px; padding: 7px 10px; }
      .intro { flex-direction: column; align-items: flex-start; }
      .controls { align-items: flex-start; }
      button { padding: 10px 12px; }
    }

    /* 모바일 입력창 자동 확대 방지: iOS/모바일 브라우저는 input font-size가 16px 미만이면 화면을 확대함 */
    .rank-form input {
      font-size: 16px !important;
      min-width: 0;
    }

    .overlay {
      padding: 14px !important;
    }

    .overlay h2 {
      font-size: clamp(34px, 10vw, 48px) !important;
      line-height: 1 !important;
    }

    .overlay p {
      font-size: clamp(18px, 5vw, 26px);
      line-height: 1.25;
      max-width: 92%;
    }

    .overlay .rank-form {
      width: min(92%, 330px);
      align-items: stretch;
    }

    .overlay .rank-form input,
    .overlay .rank-form button {
      height: 54px;
    }

    @media (max-width: 430px) {
      .overlay {
        gap: 10px !important;
      }

      .overlay .rank-form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .overlay .rank-form button {
        padding-left: 12px;
        padding-right: 12px;
      }
    }

    @media (max-height: 680px) {
      .overlay h2 {
        font-size: clamp(30px, 9vw, 42px) !important;
      }

      .overlay p {
        font-size: 18px;
      }

      .overlay .rank-form input,
      .overlay .rank-form button {
        height: 48px;
      }
    }

  </style>
</head>
<body>
  <main class="container">
    <div class="header">
      <h1>2048</h1>
      <div class="scores">
        <div class="score-box"><small>SCORE</small><span id="score">0</span></div>
        <div class="score-box"><small>BEST</small><span id="best">0</span></div>
      </div>
    </div>

    <div class="intro">
      <div>같은 숫자를 합쳐 <b>2048</b>을 만들어보세요.</div>
      <button id="newGame">새 게임</button>
    </div>

    <div class="controls">
      <div class="mode-buttons">
        <button id="mode3" class="secondary">3 × 3</button>
        <button id="mode4" class="secondary active">4 × 4</button>
      </div>
      <button id="undo" class="secondary" disabled>실행취소 1회</button>
      <button id="openRankModal" class="secondary">🏆 랭킹 보기</button>
    </div>

    <section id="board" class="board" aria-label="2048 game board">
      <div class="grid" id="grid"></div>
      <div class="tile-layer" id="tileLayer"></div>
      <div class="overlay" id="overlay">
        <h2 id="message">Game Over</h2>
        <p id="subMessage"></p>
        <div class="rank-form">
          <input id="playerName" type="text" maxlength="12" placeholder="이름 입력" autocomplete="off" />
          <button id="saveRank">랭킹 등록</button>
        </div>
        <button id="viewRankAfterSave" class="secondary">랭킹 보기</button>
        <button id="again">다시 시작</button>
      </div>
    </section>

    <div class="rank-modal" id="rankModal" aria-hidden="true">
      <div class="rank-modal-card">
        <div class="rank-modal-header">
          <h3>🏆 랭킹 보기</h3>
          <button id="closeRankModal" class="secondary small-btn">닫기</button>
        </div>

        <div class="rank-tabs">
          <button id="rankTab3" class="secondary">3×3</button>
          <button id="rankTab4" class="secondary active">4×4</button>
        </div>

        <div class="rank-panel-modal">
          <table>
            <thead>
              <tr>
                <th>순위</th>
                <th>이름</th>
                <th>점수</th>
              </tr>
            </thead>
            <tbody id="rankModalBody"></tbody>
          </table>
          <div id="emptyRankModal" class="empty-rank">아직 등록된 랭킹이 없습니다.</div>
          <div id="onlineStatus" class="empty-rank" style="font-size:12px;padding-top:4px;"></div>
        </div>
</div>
    </div>

    <div class="hint">PC: 방향키 / 모바일: 스와이프 / 한 턴만 실행취소 가능</div>
  </main>

  <script>
    let SIZE = 4;
    const WIN_VALUE = 2048;
    const MOVE_MS = 125;

    let board = [];
    let score = 0;
    let best = 0;
    let won = false;
    let history = null;
    let tileId = 1;
    let isAnimating = false;
    let touchStartX = 0;
    let touchStartY = 0;
    let visibleRankSize = 4;

    const root = document.documentElement;
    const gridEl = document.getElementById("grid");
    const tileLayer = document.getElementById("tileLayer");
    const boardEl = document.getElementById("board");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const overlay = document.getElementById("overlay");
    const message = document.getElementById("message");
    const subMessage = document.getElementById("subMessage");
    const undoBtn = document.getElementById("undo");
    const mode3Btn = document.getElementById("mode3");
    const mode4Btn = document.getElementById("mode4");
    const saveRankBtn = document.getElementById("saveRank");
    const playerNameInput = document.getElementById("playerName");
    const viewRankAfterSaveBtn = document.getElementById("viewRankAfterSave");
    const rankModal = document.getElementById("rankModal");
    const rankModalBody = document.getElementById("rankModalBody");
    const emptyRankModal = document.getElementById("emptyRankModal");
    const openRankModalBtn = document.getElementById("openRankModal");
    const closeRankModalBtn = document.getElementById("closeRankModal");
    const rankTab3 = document.getElementById("rankTab3");
    const rankTab4 = document.getElementById("rankTab4");
const onlineStatus = document.getElementById("onlineStatus");

    function storageKey() {
      return `animated2048Best_${SIZE}`;
    }

    const SUPABASE_URL = "https://wyrvbhfnxhzyaidcgeka.supabase.co";
    const SUPABASE_KEY = "sb_publishable_aULUqscPeqoEsDwKy1TMsg_YRDuFj5x";
    const RANKING_TABLE = "rankings";

    function modeLabel(size = SIZE) {
      return `${size}x${size}`;
    }

    async function fetchRanks(size = visibleRankSize || SIZE) {
      const url = `${SUPABASE_URL}/rest/v1/${RANKING_TABLE}?mode=eq.${modeLabel(size)}&select=name,score,mode,created_at&order=score.desc&order=created_at.asc&limit=10`;

      const response = await fetch(url, {
        method: "GET",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`
        }
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`랭킹 조회 실패 ${response.status}: ${text}`);
      }

      return await response.json();
    }

    async function insertRank(name, scoreValue, size = SIZE) {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${RANKING_TABLE}`, {
        method: "POST",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json",
          "Prefer": "return=minimal"
        },
        body: JSON.stringify({
          name,
          score: scoreValue,
          mode: modeLabel(size)
        })
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`랭킹 등록 실패 ${response.status}: ${text}`);
      }
    }

    function renderRankRows(ranks) {
      rankModalBody.innerHTML = "";
      emptyRankModal.style.display = ranks.length ? "none" : "block";

      ranks.forEach((rank, index) => {
        const tr = document.createElement("tr");

        const rankTd = document.createElement("td");
        rankTd.textContent = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : index + 1;

        const nameTd = document.createElement("td");
        nameTd.className = "name";
        nameTd.textContent = rank.name;

        const scoreTd = document.createElement("td");
        scoreTd.textContent = Number(rank.score || 0).toLocaleString();

        tr.append(rankTd, nameTd, scoreTd);
        rankModalBody.appendChild(tr);
      });
    }

    async function renderRanks(size = visibleRankSize || SIZE) {
      visibleRankSize = size;

      rankTab3.classList.toggle("active", size === 3);
      rankTab4.classList.toggle("active", size === 4);

      rankModalBody.innerHTML = "";
      emptyRankModal.style.display = "block";
      emptyRankModal.textContent = "랭킹 불러오는 중...";
      onlineStatus.textContent = "";

      try {
        const ranks = await fetchRanks(size);
        renderRankRows(ranks);
        emptyRankModal.textContent = "아직 등록된 랭킹이 없습니다.";
        onlineStatus.textContent = "공용 랭킹 연결됨";
      } catch (error) {
        console.error(error);
        rankModalBody.innerHTML = "";
        emptyRankModal.style.display = "block";
        emptyRankModal.textContent = "랭킹을 불러오지 못했습니다.";
        onlineStatus.textContent = error.message;
      }
    }

    async function submitRank() {
      const name = playerNameInput.value.trim();
      if (!name) {
        playerNameInput.focus();
        return;
      }

      saveRankBtn.disabled = true;
      saveRankBtn.textContent = "등록 중...";

      try {
        await insertRank(name, score, SIZE);
        await renderRanks(SIZE);
        saveRankBtn.textContent = "등록 완료";
      } catch (error) {
        console.error(error);
        saveRankBtn.disabled = false;
        saveRankBtn.textContent = "다시 등록";
        alert("랭킹 등록에 실패했습니다. Supabase 테이블/정책을 확인해주세요.");
      }
    }

    function resetRankForm() {
      playerNameInput.value = "";
      saveRankBtn.disabled = false;
      saveRankBtn.textContent = "랭킹 등록";
    }

    function openRankModal(size = SIZE) {
      rankModal.classList.add("show");
      rankModal.setAttribute("aria-hidden", "false");
      renderRanks(size);
    }

    function closeRankModal() {
      rankModal.classList.remove("show");
      rankModal.setAttribute("aria-hidden", "true");
    }
function loadBest() {
      best = Number(localStorage.getItem(storageKey()) || 0);
      bestEl.textContent = best;
    }

    function updateRootSize() {
      root.style.setProperty("--size", SIZE);
    }

    function emptyBoard() {
      return Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
    }

    function cloneBoard(src) {
      return src.map(row => row.map(tile => tile ? { ...tile } : null));
    }

    function snapshot() {
      return { board: cloneBoard(board), score, won };
    }

    function restore(snap) {
      board = cloneBoard(snap.board);
      score = snap.score;
      won = snap.won;
      history = null;
      overlay.classList.remove("show");
      renderFinal();
      updateUi();
    }

    function createGrid() {
      gridEl.innerHTML = "";
      for (let i = 0; i < SIZE * SIZE; i++) {
        const cell = document.createElement("div");
        cell.className = "grid-cell";
        gridEl.appendChild(cell);
      }
    }

    function startGame() {
      updateRootSize();
      createGrid();
      loadBest();

      board = emptyBoard();
      score = 0;
      won = false;
      history = null;
      tileId = 1;
      isAnimating = false;
      overlay.classList.remove("show");

      addRandomTile();
      addRandomTile();
      renderFinal();
      updateUi();
      updateModeButtons();
      renderRanks(SIZE);
    }

    function setMode(size) {
      if (SIZE === size) return;
      SIZE = size;
  
    // 모바일/PWA 안전장치: 랭킹 버튼 직접 연결
    openRankModalBtn.onclick = () => openRankModal(SIZE);
    viewRankAfterSaveBtn.onclick = () => openRankModal(SIZE);

    startGame();
    }

    function updateModeButtons() {
      mode3Btn.classList.toggle("active", SIZE === 3);
      mode4Btn.classList.toggle("active", SIZE === 4);
    }

    function getEmptyCells() {
      const empty = [];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (!board[r][c]) empty.push({ r, c });
        }
      }
      return empty;
    }

    function addRandomTile() {
      const empty = getEmptyCells();
      if (!empty.length) return null;

      const picked = empty[Math.floor(Math.random() * empty.length)];
      const tile = {
        id: tileId++,
        value: Math.random() < 0.9 ? 2 : 4,
        r: picked.r,
        c: picked.c,
        new: true,
        merged: false
      };

      board[picked.r][picked.c] = tile;
      return tile;
    }

    function updateUi() {
      scoreEl.textContent = score;

      if (score > best) {
        best = score;
        localStorage.setItem(storageKey(), String(best));
      }

      bestEl.textContent = best;
      undoBtn.disabled = !history || isAnimating;
    }

    function tilePosition(index) {
      return `calc(var(--gap) + ${index} * (var(--cell-size) + var(--gap)))`;
    }

    function tileClass(value) {
      if (value <= 8192) return `v${value}`;
      return "vbig";
    }

    function getFontSize(value) {
      const digits = String(value).length;
      if (SIZE === 3) {
        if (digits <= 2) return "clamp(38px, 15vw, 78px)";
        if (digits === 3) return "clamp(32px, 12vw, 64px)";
        if (digits === 4) return "clamp(26px, 10vw, 52px)";
        return "clamp(22px, 8vw, 44px)";
      }

      if (digits <= 2) return "clamp(28px, 9vw, 56px)";
      if (digits === 3) return "clamp(24px, 7.5vw, 48px)";
      if (digits === 4) return "clamp(20px, 6.6vw, 42px)";
      return "clamp(18px, 5.8vw, 38px)";
    }

    function createTileEl(tile, row, col, extraClass = "") {
      const el = document.createElement("div");
      el.className = `tile ${tileClass(tile.value)} ${extraClass}`;
      el.textContent = tile.value;
      el.dataset.id = tile.id;
      el.style.left = tilePosition(col);
      el.style.top = tilePosition(row);
      el.style.fontSize = getFontSize(tile.value);
      return el;
    }

    function renderFinal() {
      tileLayer.innerHTML = "";

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const tile = board[r][c];
          if (!tile) continue;

          const classes = [];
          if (tile.new) classes.push("new");
          if (tile.merged) classes.push("merged");

          const el = createTileEl(tile, r, c, classes.join(" "));
          tileLayer.appendChild(el);

          tile.new = false;
          tile.merged = false;
        }
      }
    }

    function getTraversal(direction) {
      const cells = [];
      const rows = [...Array(SIZE).keys()];
      const cols = [...Array(SIZE).keys()];

      if (direction === "right") cols.reverse();
      if (direction === "down") rows.reverse();

      for (const r of rows) {
        for (const c of cols) {
          cells.push({ r, c });
        }
      }

      return cells;
    }

    function vector(direction) {
      if (direction === "left") return { r: 0, c: -1 };
      if (direction === "right") return { r: 0, c: 1 };
      if (direction === "up") return { r: -1, c: 0 };
      return { r: 1, c: 0 };
    }

    function inBounds(r, c) {
      return r >= 0 && r < SIZE && c >= 0 && c < SIZE;
    }

    function prepareTiles() {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const tile = board[r][c];
          if (!tile) continue;
          tile.r = r;
          tile.c = c;
          tile.previousR = r;
          tile.previousC = c;
          tile.new = false;
          tile.merged = false;
          tile.remove = false;
          tile.mergeInto = null;
        }
      }
    }

    function findFarthestPosition(r, c, dir) {
      let previous;

      do {
        previous = { r, c };
        r += dir.r;
        c += dir.c;
      } while (inBounds(r, c) && !board[r][c]);

      return {
        farthest: previous,
        next: { r, c }
      };
    }

    function move(direction) {
      if (isAnimating || overlay.classList.contains("show")) return;

      const before = JSON.stringify(board.map(row => row.map(t => t ? t.value : 0)));
      const previousState = snapshot();

      prepareTiles();

      const dir = vector(direction);
      const traversal = getTraversal(direction);
      const movingTiles = [];
      let moved = false;
      let gained = 0;

      for (const cell of traversal) {
        const tile = board[cell.r][cell.c];
        if (!tile) continue;

        const positions = findFarthestPosition(cell.r, cell.c, dir);
        const next = positions.next;

        if (inBounds(next.r, next.c)) {
          const nextTile = board[next.r][next.c];
          if (nextTile && nextTile.value === tile.value && !nextTile.mergedFrom) {
            board[cell.r][cell.c] = null;

            const mergedTile = {
              id: tileId++,
              value: tile.value * 2,
              r: next.r,
              c: next.c,
              previousR: nextTile.r,
              previousC: nextTile.c,
              new: false,
              merged: true,
              mergedFrom: [tile, nextTile]
            };

            tile.r = next.r;
            tile.c = next.c;
            tile.remove = true;
            tile.mergeInto = mergedTile.id;

            nextTile.r = next.r;
            nextTile.c = next.c;
            nextTile.remove = true;
            nextTile.mergeInto = mergedTile.id;

            movingTiles.push(tile);
            movingTiles.push(nextTile);

            board[next.r][next.c] = mergedTile;
            gained += mergedTile.value;
            moved = true;
            continue;
          }
        }

        const far = positions.farthest;
        if (far.r !== cell.r || far.c !== cell.c) {
          board[cell.r][cell.c] = null;
          board[far.r][far.c] = tile;
          tile.r = far.r;
          tile.c = far.c;
          movingTiles.push(tile);
          moved = true;
        }
      }

      const after = JSON.stringify(board.map(row => row.map(t => t ? t.value : 0)));
      if (!moved || before === after) return;

      score += gained;
      history = previousState;
      isAnimating = true;
      updateUi();

      animateMove(movingTiles, () => {
        clearTransientMergeFlags();
        addRandomTile();
        renderFinal();
        updateUi();

        if (hasValue(WIN_VALUE) && !won) {
          won = true;
          setTimeout(() => showOverlay("You Win!", "이름을 입력하면 랭킹에 등록됩니다."), 160);
        } else if (!canMove()) {
          setTimeout(() => showOverlay("Game Over", "이름을 입력하면 랭킹에 등록됩니다."), 160);
        }
      });
    }

    function clearTransientMergeFlags() {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const tile = board[r][c];
          if (!tile) continue;
          delete tile.mergedFrom;
        }
      }
    }

    function animateMove(movingTiles, callback) {
      tileLayer.innerHTML = "";

      const stillTiles = [];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const tile = board[r][c];
          if (!tile) continue;
          if (tile.mergedFrom) continue;
          stillTiles.push(tile);
        }
      }

      const animatedIds = new Set();

      for (const tile of movingTiles) {
        if (animatedIds.has(tile.id)) continue;
        animatedIds.add(tile.id);

        const el = createTileEl(tile, tile.previousR, tile.previousC);
        tileLayer.appendChild(el);

        requestAnimationFrame(() => {
          el.style.left = tilePosition(tile.c);
          el.style.top = tilePosition(tile.r);
        });
      }

      for (const tile of stillTiles) {
        if (animatedIds.has(tile.id)) continue;
        const el = createTileEl(tile, tile.r, tile.c);
        tileLayer.appendChild(el);
      }

      setTimeout(() => {
        isAnimating = false;
        callback();
      }, MOVE_MS + 35);
    }

    function hasValue(value) {
      return board.some(row => row.some(tile => tile && tile.value === value));
    }

    function canMove() {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const tile = board[r][c];
          if (!tile) return true;
          if (c < SIZE - 1 && board[r][c + 1] && tile.value === board[r][c + 1].value) return true;
          if (r < SIZE - 1 && board[r + 1][c] && tile.value === board[r + 1][c].value) return true;
        }
      }
      return false;
    }

    function showOverlay(title, subtitle) {
      message.textContent = title;
      subMessage.textContent = subtitle || "";
      resetRankForm();
      overlay.classList.add("show");
    }

    function undo() {
      if (!history || isAnimating) return;
      restore(history);
    }

    document.addEventListener("keydown", event => {
      const keyMap = {
        ArrowLeft: "left",
        ArrowRight: "right",
        ArrowUp: "up",
        ArrowDown: "down"
      };

      const direction = keyMap[event.key];
      if (!direction) return;

      event.preventDefault();
      move(direction);
    });

    boardEl.addEventListener("touchstart", event => {
      touchStartX = event.touches[0].clientX;
      touchStartY = event.touches[0].clientY;
    }, { passive: true });

    boardEl.addEventListener("touchmove", event => {
      event.preventDefault();
    }, { passive: false });

    boardEl.addEventListener("touchend", event => {
      const dx = event.changedTouches[0].clientX - touchStartX;
      const dy = event.changedTouches[0].clientY - touchStartY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);

      if (Math.max(absX, absY) < 30) return;

      if (absX > absY) {
        move(dx > 0 ? "right" : "left");
      } else {
        move(dy > 0 ? "down" : "up");
      }
    });

    document.getElementById("newGame").addEventListener("click", startGame);
    document.getElementById("again").addEventListener("click", startGame);
    undoBtn.addEventListener("click", undo);
    mode3Btn.addEventListener("click", () => setMode(3));
    mode4Btn.addEventListener("click", () => setMode(4));

    saveRankBtn.addEventListener("click", submitRank);
    playerNameInput.addEventListener("keydown", event => {
      if (event.key === "Enter") submitRank();
    });

    openRankModalBtn.addEventListener("click", () => openRankModal(SIZE));
    viewRankAfterSaveBtn.addEventListener("click", () => openRankModal(SIZE));
    closeRankModalBtn.addEventListener("click", closeRankModal);
    rankTab3.addEventListener("click", () => renderRanks(3));
    rankTab4.addEventListener("click", () => renderRanks(4));
rankModal.addEventListener("click", event => {
      if (event.target === rankModal) closeRankModal();
    });


    // 모바일/PWA 안전장치: 랭킹 버튼 직접 연결
    openRankModalBtn.onclick = () => openRankModal(SIZE);
    viewRankAfterSaveBtn.onclick = () => openRankModal(SIZE);

    startGame();
  </script>
</body>
</html>
